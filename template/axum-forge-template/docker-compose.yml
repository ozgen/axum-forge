services:
  postgres:
    image: postgres:16
    container_name: axum-forge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: axum_forge
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d axum_forge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
